<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "error-container": "#ffdad6",
                    "secondary": "#5f5e60",
                    "tertiary-fixed": "#e2e2e4",
                    "surface-bright": "#fcf8fb",
                    "on-tertiary-fixed": "#1a1c1d",
                    "on-error-container": "#93000a",
                    "surface-tint": "#005bc1",
                    "on-primary-fixed-variant": "#004493",
                    "on-secondary-fixed": "#1b1b1d",
                    "tertiary-container": "#737576",
                    "on-secondary-container": "#636264",
                    "on-primary-fixed": "#001a41",
                    "surface-container-low": "#f6f3f5",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#d8e2ff",
                    "surface-container-lowest": "#ffffff",
                    "secondary-container": "#e2dfe1",
                    "surface": "#fcf8fb",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#adc6ff",
                    "inverse-primary": "#adc6ff",
                    "on-tertiary-container": "#fcfcfe",
                    "on-error": "#ffffff",
                    "surface-dim": "#dcd9dc",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#f3f0f2",
                    "tertiary-fixed-dim": "#c6c6c8",
                    "outline-variant": "#c1c6d7",
                    "on-background": "#1b1b1d",
                    "secondary-fixed": "#e4e2e4",
                    "inverse-surface": "#303032",
                    "background": "#fcf8fb",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#1b1b1d",
                    "primary": "#0058bc",
                    "secondary-fixed-dim": "#c8c6c8",
                    "surface-container": "#f0edef",
                    "on-surface-variant": "#414755",
                    "surface-variant": "#e4e2e4",
                    "on-secondary-fixed-variant": "#474649",
                    "tertiary": "#5a5c5e",
                    "surface-container-highest": "#e4e2e4",
                    "on-tertiary-fixed-variant": "#454749",
                    "outline": "#717786",
                    "surface-container-high": "#eae7ea",
                    "primary-container": "#0070eb",
                    "on-primary-container": "#fefcff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter", "PingFang SC", "sans-serif"],
                    "body": ["Inter", "PingFang SC", "sans-serif"],
                    "label": ["Inter", "PingFang SC", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', 'PingFang SC', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .cuper-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Anchor -->
<nav class="bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl flex justify-between items-center px-6 py-4 w-full docked full-width top-0 z-50 tonal-shift-from-surface-to-container-low">
<div class="flex items-center space-x-4">
<!-- Title restricted to large, elegant, non-bold as per user request -->
<span class="font-light tracking-[0.2em] text-on-surface-variant opacity-80 text-4xl" style="">VOICEDANCE</span>
</div>
</nav>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 min-h-[calc(100vh-80px)]">
<!-- Empty State Container -->
<div class="w-full max-w-xl flex flex-col items-center">
<!-- Central Empty Box -->
<div class="group relative w-full aspect-video md:aspect-[21/9] rounded-[2rem] border border-outline-variant/15 bg-surface-container-low flex flex-col items-center justify-center cursor-pointer transition-all duration-500 hover:bg-surface-container hover:shadow-[0_24px_48px_rgba(0,0,0,0.02)]">
<!-- Minimal Decorative Gradient Background for the box -->
<div class="absolute inset-0 rounded-[2rem] opacity-0 group-hover:opacity-100 transition-opacity duration-700 pointer-events-none bg-gradient-to-tr from-primary/5 via-transparent to-transparent"></div>
<!-- Interaction Elements -->
<div class="relative z-10 flex flex-col items-center space-y-6">
<div class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="add" style='font-variation-settings: "wght" 300;'>add</span>
</div>
<div class="flex flex-col items-center space-y-2">
<span class="text-xl font-light tracking-widest text-on-surface" style="">上传视频</span>
<p style=""><div class="flex flex-col items-center text-xs text-slate-400 font-light tracking-wide">
<span>仅支持MP4格式</span>
<span>文件大小不超过50M</span>
</div></p>
</div>
</div>
<!-- Hidden Input for logic -->
<input accept=".mp4" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Contextual Metadata / Hint -->
</div>
</main>
<!-- Bottom Decoration (No Navbar as per request) -->
<footer class="flex items-end justify-center h-0" style="display: none;">
</footer>
<!-- Background Atmospheric Element -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full blur-[120px] bg-primary/5 -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30%] h-[30%] rounded-full blur-[100px] bg-secondary/5 -z-10"></div>
</body></html>
